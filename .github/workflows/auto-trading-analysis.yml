name: Auto Trading Analysis

on:
  push:
    paths:
      - 'forex_data.csv'
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create GitHub Issue with analysis'
        required: false
        default: 'true'
        type: boolean
      send_telegram:
        description: 'Send Telegram notification'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: trading-analysis
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze Trading Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet pandas numpy requests python-dateutil

      - name: Run Trading Analysis
        id: analysis
        run: |
          python scripts/analyze_trading.py \
            --csv forex_data.csv \
            --output analysis_result.json

      - name: Generate Report
        id: report
        env:
          ANALYSIS_FILE: analysis_result.json
        run: |
          python scripts/generate_report.py \
            --input analysis_result.json \
            --report ANALYSIS_REPORT.md \
            --history analysis_history.json

      - name: Create GitHub Issue
        if: ${{ github.event.inputs.create_issue != 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ANALYSIS_FILE: analysis_result.json
        run: |
          python scripts/create_discussion.py \
            --input analysis_result.json \
            --report ANALYSIS_REPORT.md

      - name: Send Telegram Notification
        if: ${{ github.event.inputs.send_telegram != 'false' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "1823341851"
          ANALYSIS_FILE: analysis_result.json
        run: |
          python scripts/notify_telegram.py \
            --input analysis_result.json

      - name: Commit analysis results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ANALYSIS_REPORT.md analysis_history.json
          git diff --cached --quiet || git commit -m "📊 Auto-Analysis Report - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
